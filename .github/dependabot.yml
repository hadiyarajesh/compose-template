# Keeps dependencies up to date via automated pull requests.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Gradle dependencies declared in the version catalog (gradle/libs.versions.toml).
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch related upgrades into a single PR to reduce noise.
      androidx:
        patterns:
          - "androidx.*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"

  # GitHub Actions used by the CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
